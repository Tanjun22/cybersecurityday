<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이버보안진단의 날 안내</title>

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:"Noto Sans KR", sans-serif;}
body {background:linear-gradient(135deg,#eef2f7,#dfe9f3); color:#333;}

header {
    text-align:center;
    padding:40px 20px;
}

.logo {
    width:80px;
    margin-bottom:15px;
}

h1 {font-size:1.8rem;}
.sub {color:#555; margin-top:5px;}

.date-box {
    margin-top:15px;
    padding:10px 15px;
    background:#2c7be5;
    color:white;
    display:inline-block;
    border-radius:20px;
    font-size:0.9rem;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:30px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card {
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}
.card:hover {
    transform:translateY(-5px);
    box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.card img {
    width:100%;
    cursor:pointer;
}

.card-content {padding:20px;}
.step {color:#2c7be5; font-weight:bold; margin-bottom:5px;}
.card h2 {font-size:1.2rem; margin-bottom:10px;}
.highlight {color:#2c7be5; font-weight:bold;}

footer {
    text-align:center;
    padding:30px;
    color:#777;
}

/* ✅ 이미지 확대 모달 */
.modal {
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.modal img {
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <h1>사이버보안진단의 날</h1>
    <div class="sub">매월 셋째주 수요일 · 필수 점검</div>
    <div id="dateInfo" class="date-box"></div>
</header>

<section class="container">

    <div class="card">
        <img src="제목 없음.png" onclick="openModal(this)">
        <div class="card-content">
            <div class="step">STEP 1</div>
            <h2>내PC지키미 실행</h2>
            <p>오른쪽 하단에서 <span class="highlight">내PC지키미 아이콘</span> 클릭</p>
        </div>
    </div>

    <div class="card">
        <img src="제목 없음3.png" onclick="openModal(this)">
        <div class="card-content">
            <div class="step">STEP 2</div>
            <h2>로그인</h2>
            <p><span class="highlight">시작하기 → 사용자 이름 입력</span> 후 로그인</p>
        </div>
    </div>

    <div class="card">
        <img src="제목 없음4.png" onclick="openModal(this)">
        <div class="card-content">
            <div class="step">STEP 3</div>
            <h2>보안 점검</h2>
            <p><span class="highlight">보안 점검 시작</span> 클릭 후 점검 수행</p>
        </div>
    </div>

</section>

<footer>
    ✅ 점검 완료 부탁드립니다!
</footer>

<!-- ✅ 이미지 확대 모달 -->
<div id="imgModal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
// ✅ 셋째주 수요일 계산
function getThirdWednesday(year, month){
    let date = new Date(year, month, 1);
    let count = 0;

    while(true){
        if(date.getDay() === 3){
            count++;
            if(count === 3){
                return date;
            }
        }
        date.setDate(date.getDate() + 1);
    }
}

// ✅ 날짜 표시
let today = new Date();
let target = getThirdWednesday(today.getFullYear(), today.getMonth());

let text = `이번 달 점검일: ${target.getFullYear()}년 ${target.getMonth()+1}월 ${target.getDate()}일`;

if(today.toDateString() === target.toDateString()){
    text += " ✅ 오늘입니다!";
}

document.getElementById("dateInfo").innerText = text;

// ✅ 이미지 확대 기능
function openModal(img){
    document.getElementById("imgModal").style.display = "flex";
    document.getElementById("modalImg").src = img.src;
}

function closeModal(){
    document.getElementById("imgModal").style.display = "none";
}
</script>

</body>
</html>
``
