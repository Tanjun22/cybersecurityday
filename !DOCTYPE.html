<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이버보안진단의 날 안내</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans KR", sans-serif;
    }

    body {
        background: linear-gradient(135deg, #eef2f7, #dfe9f3);
        color: #333;
    }

    header {
        text-align: center;
        padding: 50px 20px 30px;
    }

    header h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 10px;
    }

    header p {
        color: #555;
    }

    .container {
        max-width: 1100px;
        margin: auto;
        padding: 30px 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
    }

    .card {
        background: #fff;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    .card img {
        width: 100%;
        display: block;
    }

    .card-content {
        padding: 20px;
    }

    .step {
        font-size: 0.9rem;
        color: #4a90e2;
        font-weight: 600;
        margin-bottom: 5px;
    }

    .card h2 {
        font-size: 1.2rem;
        margin-bottom: 10px;
    }

    .card p {
        font-size: 0.95rem;
        color: #555;
        line-height: 1.6;
    }

    .highlight {
        color: #2c7be5;
        font-weight: bold;
    }

    footer {
        text-align: center;
        padding: 30px;
        font-size: 0.9rem;
        color: #777;
    }

    .badge {
        margin-top: 10px;
        display: inline-block;
        background: #2c7be5;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
    }
</style>
</head>

<body>

<header>
    <h1>🔐 사이버보안진단의 날 안내</h1>
    <p>매월 <strong>셋째주 수요일</strong> · 업무용 PC 필수 점검</p>
</header>

<section class="container">

    <!-- STEP 1 -->
    <div class="card">
        <img src="제목 없음.png" alt="내PC지키미 아이콘">
        <div class="card-content">
            <div class="step">STEP 1</div>
            <h2>내PC지키미 실행</h2>
            <p>
                화면 <span class="highlight">오른쪽 하단 트레이</span>에서  
                <span class="highlight">‘내PC지키미’ 아이콘</span>을 클릭하세요.
            </p>
        </div>
    </div>

    <!-- STEP 2 -->
    <div class="card">
        <img src="제목 없음3.png" alt="로그인 화면">
        <div class="card-content">
            <div class="step">STEP 2</div>
            <h2>로그인 진행</h2>
            <p>
                <span class="highlight">‘내PC지키미 시작하기’</span> 선택 후  
                <span class="highlight">사용자 이름 입력</span> → 로그인하세요.
            </p>
        </div>
    </div>

    <!-- STEP 3 -->
    <div class="card">
        <img src="제목 없음4.png" alt="보안 점검 시작">
        <div class="card-content">
            <div class="step">STEP 3</div>
            <h2>보안 점검 실행</h2>
            <p>
                <span class="highlight">‘보안 점검 시작’</span> 버튼을 클릭하여  
                PC 취약점을 점검하세요.
            </p>
        </div>
    </div>

</section>

<footer>
    ✅ 모든 교직원은 반드시 점검 완료 후 업무 진행 바랍니다.
    <br><span class="badge">정보보안 필수 준수</span>
</footer>

</body>
</html>
